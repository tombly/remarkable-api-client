name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify tag matches csproj <Version>
        run: |
          set -euo pipefail
          csproj_version=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' src/Remarkable.Api.Client/Remarkable.Api.Client.csproj)
          tag_version="${GITHUB_REF_NAME#v}"
          echo "csproj <Version>: $csproj_version"
          echo "git tag:          $GITHUB_REF_NAME (version $tag_version)"
          if [ "$csproj_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match csproj <Version> $csproj_version"
            exit 1
          fi

      - name: Restore
        run: dotnet restore Remarkable.Api.Client.slnx

      - name: Build
        run: dotnet build src/Remarkable.Api.Client/Remarkable.Api.Client.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Remarkable.Api.Client/Remarkable.Api.Client.csproj --configuration Release --no-build --output ./artifacts

      - name: Push to nuget.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
