name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Remarkable.Api.Client.slnx

      - name: Build
        run: dotnet build Remarkable.Api.Client.slnx --configuration Release --no-restore

      - name: Pack (verify nupkg builds)
        run: dotnet pack src/Remarkable.Api.Client/Remarkable.Api.Client.csproj --configuration Release --no-build --output ./artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.*nupkg
          if-no-files-found: error
